{{- if .Values.istio.enabled }}
---
# API Server DestinationRule
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "ecosystem.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  host: {{ .Release.Name }}-api.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: {{ .Values.istio.trafficPolicy.connectionPool.tcp.maxConnections }}
      http:
        http1MaxPendingRequests: {{ .Values.istio.trafficPolicy.connectionPool.http.http1MaxPendingRequests }}
        http2MaxRequests: {{ .Values.istio.trafficPolicy.connectionPool.http.http2MaxRequests }}
    outlierDetection:
      consecutiveErrors: {{ .Values.istio.trafficPolicy.outlierDetection.consecutiveErrors }}
      interval: {{ .Values.istio.trafficPolicy.outlierDetection.interval }}
      baseEjectionTime: {{ .Values.istio.trafficPolicy.outlierDetection.baseEjectionTime }}

