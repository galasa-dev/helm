apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}-dex
  name: {{ .Release.Name }}-dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dex
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-dex
      annotations:
        {{- if .Values.istio.enabled }}
        # Enable ISTIO sidecar injection
        sidecar.istio.io/inject: "true"
        # Include all inbound ports in ISTIO mesh
        traffic.sidecar.istio.io/includeInboundPorts: "*"
        # Proxy resource configuration
        sidecar.istio.io/proxyCPU: {{ .Values.istio.proxy.resources.requests.cpu | quote }}
        sidecar.istio.io/proxyMemory: {{ .Values.istio.proxy.resources.requests.memory | quote }}
        sidecar.istio.io/proxyCPULimit: {{ .Values.istio.proxy.resources.limits.cpu | quote }}
        sidecar.istio.io/proxyMemoryLimit: {{ .Values.istio.proxy.resources.limits.memory | quote }}
        # Readiness probe configuration for ISTIO proxy
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
        {{- end }}
    spec:
      serviceAccountName: galasa
      nodeSelector:
        kubernetes.io/arch: {{ .Values.architecture }}
      {{- with .Values.nodeSelectors }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: wait-for-etcd
        image: {{ .Values.kubectlImage }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        command:
          - kubectl
        args:
          - wait
          - pods
          - -l=app={{ .Release.Name }}-etcd
          - --for=condition=Ready
          - --timeout=90s
      containers:
      - image: {{ .Values.dexImage }}
        imagePullPolicy: {{ .Values.pullPolicy }}
        ## 
        ## Provide some guidance to kubernetes on how much memory/cpu this container needs.
        {{- if .Values.dex }}
        {{- if .Values.dex.resources }}
        {{- with .Values.dex.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        {{- end }}
        name: dex
        args:
          - dex
          - serve
          - --web-http-addr
          - 0.0.0.0:5556
          - --grpc-addr
          - 0.0.0.0:5557
          - --telemetry-addr
          - 0.0.0.0:5558
          - /etc/dex/config.yaml
      {{- with .Values.dex.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
      {{- end }}
        ports:
        - name: http
          containerPort: 5556
          protocol: TCP
        - name: grpc
          containerPort: 5557
          protocol: TCP
        - name: telemetry
          containerPort: 5558
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz/live
            port: telemetry
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: telemetry
        volumeMounts:
        - name: config
          mountPath: /etc/dex
          readOnly: true
      volumes:
      - name: config
        secret:
        {{- if .Values.dex.configSecret.create }}
          secretName: {{ .Release.Name }}-dex-config
        {{- else }}
          secretName: {{ .Values.dex.configSecret.secretName }}
        {{- end }}
